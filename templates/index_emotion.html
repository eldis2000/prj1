<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재치만점 삼행시 생성기</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            color: white;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05rem;
            background: linear-gradient(to right, #fff, #ddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: calc(100% - 3rem);
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        button {
            padding: 1rem 2rem;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s transform;
            width: 100%;
            max-width: 200px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .result-area {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: left;
        }

        .poem-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 16px;
            margin-top: 1rem;
            border-left: 4px solid var(--secondary-color);
        }

        .poem-line {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            line-height: 1.6;
        }

        .poem-line span.letter {
            font-weight: 900;
            color: var(--secondary-color);
            margin-right: 0.5rem;
            font-size: 1.5rem;
        }

        .error-message {
            color: #ff4d4d;
            margin-top: 1rem;
            font-weight: 600;
        }

        .loading {
            display: none;
            margin-top: 1rem;
            font-style: italic;
            opacity: 0.8;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 삼행시 장인</h1>
        <p class="subtitle">단어를 입력하면 재치 있는 삼행시를 지어드립니다!</p>

        <form action="/generate" method="post" onsubmit="showLoading()">
            <div class="input-group">
                <input type="text" name="word" placeholder="단어를 입력하세요 (예: 비행기)" required autofocus value="{{ word if word else '' }}">
            </div>
            <button type="submit">생성하기</button>
        </form>

        <div id="loading" class="loading">Gemini가 신들린 드립을 생각 중입니다...</div>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        {% if poem_lines %}
            <div class="result-area">
                <h3>결과: {{ word }}</h3>
                <div class="poem-card">
                    {% for line in poem_lines %}
                        <div class="poem-line">
                            {{ line }}
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}

        <footer>Powered by Gemini 2.0 & FastAPI</footer>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
    </script>
</body>
</html>
