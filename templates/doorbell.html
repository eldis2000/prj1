<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligent Doorbell MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            margin-top: 1rem;
        }

        .card {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4 / 3;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-overlay {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            font-weight: 600;
            display: none;
        }

        .status-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .status-box {
            padding: 1.25rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05);
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-box h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-value {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .granted { color: var(--success); }
        .denied { color: var(--danger); }
        .alert { color: #fbbf24; }

        .analysis-image {
            width: 100%;
            border-radius: 0.75rem;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn.secondary {
            background: #475569;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        canvas#captureCanvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Intelligent Doorbell Cam</h1>
        <p class="subtitle">실시간 카메라 연동 지능형 현관 보안 시스템</p>

        <div class="main-layout">
            <!-- Left: Live Video -->
            <div class="card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div id="overlayStatus" class="result-overlay">가족 확인됨</div>
                </div>
                <div class="controls">
                    <button id="startBtn" class="btn" onclick="startCamera()">카메라 시작</button>
                    <button id="stopBtn" class="btn secondary" onclick="stopCamera()" disabled>중지</button>
                </div>
            </div>

            <!-- Right: Analysis Panel -->
            <div class="status-panel">
                <div class="card" style="height: 100%;">
                    <div class="status-box">
                        <h3>출입 허용 상태</h3>
                        <div id="accessStatus" class="status-value">Ready</div>
                    </div>
                    
                    <div class="status-box" style="margin-top: 1rem;">
                        <h3>택배 감지</h3>
                        <div id="packageStatus" class="status-value">Ready</div>
                    </div>

                    <div style="margin-top: 1.5rem;">
                        <h3>마지막 분석 스냅샷</h3>
                        <img id="analysisSnapshot" class="analysis-image" src="https://via.placeholder.com/400x300?text=No+Data" alt="Snapshot">
                        <div id="loadingText" style="display: none; margin-top: 0.5rem; font-size: 0.9rem; color: var(--primary);">
                            분석 중<span class="loading-dots"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="captureCanvas" width="640" height="480"></canvas>

    <script>
        let stream = null;
        let analysisInterval = null;
        const video = document.getElementById('video');
        const canvas = document.getElementById('captureCanvas');
        const ctx = canvas.getContext('2d');

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                
                // 3초마다 분석 시작
                analysisInterval = setInterval(captureAndAnalyze, 3000);
            } catch (err) {
                console.error("Error accessing camera:", err);
                alert("카메라를 시작할 수 없습니다. 권한을 확인해주세요.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null; // Ensure stream is nullified
            }
            if (analysisInterval) {
                clearInterval(analysisInterval);
                analysisInterval = null;
            }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('accessStatus').textContent = "Stopped";
            document.getElementById('packageStatus').textContent = "Stopped";
            document.getElementById('overlayStatus').style.display = "none";
        }

        async function captureAndAnalyze() {
            if (!stream) return; // double check stream

            document.getElementById('loadingText').style.display = 'block';

            // 프레임 캡처
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!stream) return; // check if camera was stopped while capturing

                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                try {
                    const response = await fetch('/api/v1/doorbell-analyze', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (stream) { // check if camera was stopped while waiting for response
                        updateUI(data);
                    }
                } catch (err) {
                    console.error("Analysis error:", err);
                } finally {
                    document.getElementById('loadingText').style.display = 'none';
                }
            }, 'image/jpeg', 0.8);
        }

        function updateUI(data) {
            const accessStatus = document.getElementById('accessStatus');
            const overlayStatus = document.getElementById('overlayStatus');
            const packageStatus = document.getElementById('packageStatus');
            const snapshot = document.getElementById('analysisSnapshot');

            // 1. 사람/가족 상태
            if (data.has_person) {
                if (data.access_granted) {
                    accessStatus.textContent = "🔓 Access Granted (가족)";
                    accessStatus.className = "status-value granted";
                    overlayStatus.textContent = "가족 확인됨";
                    overlayStatus.style.display = "block";
                    overlayStatus.style.color = "#22c55e";
                } else {
                    accessStatus.textContent = "🔒 Access Denied (미등록)";
                    accessStatus.className = "status-value denied";
                    overlayStatus.textContent = "외부인 감지";
                    overlayStatus.style.display = "block";
                    overlayStatus.style.color = "#ef4444";
                }
            } else {
                accessStatus.textContent = "👤 사람 없음";
                accessStatus.className = "status-value";
                overlayStatus.style.display = "none";
            }

            // 2. 택배 상태
            if (data.has_package) {
                packageStatus.textContent = "📦 Package Detected!";
                packageStatus.className = "status-value alert";
            } else {
                packageStatus.textContent = "Nothing detected";
                packageStatus.className = "status-value";
            }

            // 3. 사진 업데이트
            snapshot.src = data.image_url + "?t=" + new Date().getTime();
        }
    </script>
</body>
</html>
</body>
</html>
