<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Object Detection - Premium API</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Object Detection</h1>
        <p class="subtitle">이미지를 업로드하고 최신 AI 기술로 사물을 탐지해보세요.</p>

        <form id="upload-form">
            <div class="upload-section" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="file-name">이미지를 클릭하거나 드래그하여 선택하세요</p>
                <input type="file" id="file-input" name="file" accept="image/*" onchange="handleFileSelect(event)">
            </div>
            <div style="text-align: center;">
                <button type="submit" class="btn">분석 시작하기</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI가 이미지를 분석하고 있습니다...</p>
        </div>

        <div class="result-section" id="result-section">
            <div class="result-container">
                <div class="image-wrapper">
                    <img id="result-image" src="" alt="Detection result">
                </div>
                <div class="info-panel">
                    <h3>탐지 결과</h3>
                    <div id="detection-info">
                        <ul class="detection-list" id="detection-list">
                            <!-- Results will be injected here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('file-name').innerText = file.name;
            }
        }

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('file-input');
            if (fileInput.files.length === 0) {
                alert('이미지를 선택해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // UI Reset
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch('/detect-ui', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('서버 오류 발생');

                const data = await response.json();

                // Update Image
                document.getElementById('result-image').src = data.image_url + '?t=' + new Date().getTime();
                
                // Update List
                const list = document.getElementById('detection-list');
                list.innerHTML = '';
                
                if (data.detections.length === 0) {
                    list.innerHTML = '<li class="detection-item">탐지된 사물이 없습니다.</li>';
                } else {
                    data.detections.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'detection-item';
                        li.innerHTML = `
                            <span class="detection-label">${item.class}</span>
                            <span class="detection-score">${(item.score * 100).toFixed(1)}%</span>
                        `;
                        list.appendChild(li);
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';

            } catch (error) {
                alert('분석 중 오류가 발생했습니다: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
